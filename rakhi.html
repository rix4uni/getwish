<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Rakhi 🪢</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(135deg, #8b0000, #b22222, #ff6347);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ffd700, 0 0 60px #ffaa00;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffaa00; }
  50% { text-shadow: 0 0 50px #ffd700, 0 0 100px #ffffff, 0 0 150px #ffd700; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Comic Sans MS", cursive;
}

#yes {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #8b0000;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,215,0,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating rakhis */
.rakhi {
  position: absolute;
  font-size: 40px;
  animation: float 8s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-30px) rotate(10deg); }
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 25px;
  animation: heartFloat 6s linear forwards;
}

@keyframes heartFloat {
  from { transform: translateY(100vh) scale(0.5); opacity: 0; }
  to { transform: translateY(-10vh) scale(1); opacity: 0.8; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Comic Sans MS", cursive;
  color: #8b0000;
  background: linear-gradient(135deg, #ffd700, #ffffff);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,215,0,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#rakhiMsg {
  display: none;
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ffd700;
}

.rakhi-main {
  font-size: 100px;
  margin: 20px;
  animation: spin 3s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1 id="mainText">🪢 Happy Rakhi <span id="name"></span>! 🎀</h1>

<button id="yes" class="btn">Tie Rakhi 🪢</button>
<button id="no" class="btn">Ignore 😒</button>

<div id="rakhiMsg">
  <div class="rakhi-main">🪢</div>
  💕 Sibling Love <span id="name2"></span>! 💕
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("rakhiMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Sibling';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy Rakhi ' + name + ' 🪢';

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press TIE RAKHI 🪢", "Arey yaar 😂", "Stop chasing meee 😆", "Tie the bond 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "Ignore option disabled 😂", "Destiny says SIBLINGS 🪢", "Bas karo 😂",
  "You really trying huh 🤭", "Team RAKHI only 😌", "Dil se bolo YES 💕",
  "Arre arre arre 😆", "Love only, no ignore 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape bond 🪢",
  "Say tie rakhi warna… 😜", "Smart person chooses SIBLING 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click TIE, be happy 🪢"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No sibling love? 💔"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating rakhis */
const rakhis = ['🪢', '🎀', '🎗️', '💝'];
setInterval(() => {
  const r = document.createElement('div');
  r.className = 'rakhi';
  r.textContent = rakhis[Math.floor(Math.random() * rakhis.length)];
  r.style.left = Math.random() * 100 + 'vw';
  r.style.top = (10 + Math.random() * 60) + '%';
  r.style.animationDuration = (6 + Math.random() * 4) + 's';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 10000);
}, 600);

/* Hearts */
const hearts = ['❤️', '💖', '💕', '💗', '💝'];
setInterval(() => {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (5 + Math.random() * 3) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 8000);
}, 500);

function megaCelebration() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'rakhi';
      r.textContent = rakhis[Math.floor(Math.random() * rakhis.length)];
      r.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      r.style.top = '30%';
      r.style.fontSize = (30 + Math.random() * 30) + 'px';
      r.style.animationDuration = '5s';
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 5000);
    }, i * 80);
  }
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      h.style.top = '50%';
      h.style.animationDuration = '4s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }, i * 60);
  }
}
</script>

</body>
</html>
