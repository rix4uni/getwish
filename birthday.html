<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  color: white;
  text-shadow: 0 0 30px rgba(255,255,255,0.8);
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Comic Sans MS", cursive;
}

#yes {
  background: #ffd700;
  color: #333;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px #ffd700;
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Balloons */
.balloon {
  position: absolute;
  font-size: 40px;
  animation: floatUp 8s linear forwards;
  opacity: 0.9;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh) rotate(-10deg);
    opacity: 1;
  }
  to {
    transform: translateY(-20vh) rotate(10deg);
    opacity: 0;
  }
}

/* Confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: confettiFall 4s linear forwards;
}

@keyframes confettiFall {
  from {
    transform: translateY(-10vh) rotate(0deg);
    opacity: 1;
  }
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Comic Sans MS", cursive;
  color: #333;
  background: #ffd700;
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,215,0,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#bdayMsg {
  display: none;
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 25px white;
}

.cake {
  font-size: 80px;
  margin: 20px;
  animation: wiggle 1s infinite;
}

@keyframes wiggle {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

.sparkle {
  position: absolute;
  font-size: 20px;
  animation: sparkleAnim 2s ease-in-out infinite;
}

@keyframes sparkleAnim {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<h1 id="mainText">🎂 Happy Birthday <span id="name"></span>! 🎉</h1>

<button id="yes" class="btn">Celebrate 🎉</button>
<button id="no" class="btn">Ignore 😒</button>

<div id="bdayMsg">
  <div class="cake">🎂</div>
  🎈 Let's Party <span id="name2"></span>! 🎈
</div>

<script>
/* Anti-Tampering Protection - Makes No Button Immortal */
(function() {
  'use strict';
  let protectionInterval = null;
  let devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("bdayMsg");
const mainText = document.getElementById("mainText");

// Get name from URL
const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy Birthday ' + name + ' 🎂';

let attempts = 0;
let popupLock = false;
let escapeCooldown = false;

/* Funny birthday lines */
const funnyTexts = [
  "Nice try 😜",
  "Hehe can't catch me 😂",
  "Almosttt 🤭",
  "Too slow 😏",
  "Press CELEBRATE 🎉",
  "Arey yaar 😂",
  "Stop chasing meee 😆",
  "Come party naaa 🥺",
  "Itna attitude? 😏",
  "Catch me if you can 🏃",
  "Wrong button buddy 😜",
  "Ignore option disabled 😂",
  "Destiny says PARTY 🎉",
  "Bas karo 😂",
  "You really trying huh 🤭",
  "Team CELEBRATE only 😌",
  "Dil se bolo YES 🎂",
  "Arre arre arre 😆",
  "Party only, no ignore 😜",
  "System error ❌",
  "Button not available 😂",
  "Try harder 😏",
  "You can't escape fun 🎉",
  "Say celebrate warna… 😜",
  "Smart person chooses PARTY 😉",
  "LOL nice attempt 🤣",
  "Mission failed 😂",
  "This button is shy 🙈",
  "Click CELEBRATE, be happy 🎂"
];

/* YES CLICK */
yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

/* Chase detection */
_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("Party pooper? 😜"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

/* Move No button */
function moveNo() {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 70);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* Small popup */
function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;

  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";

  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
    popupLock = false;
  }, 900);
}

/* Big message (3 seconds) */
function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Balloons */
const balloonEmojis = ['🎈', '🎉', '🎊', '🎁', '🧁', '🍰'];
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
  b.style.left = Math.random() * 100 + 'vw';
  b.style.animationDuration = (6 + Math.random() * 4) + 's';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 10000);
}, 400);

/* Confetti */
const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3', '#54a0ff'];
setInterval(() => {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.left = Math.random() * 100 + 'vw';
  c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 4000);
}, 200);

/* Mega celebration */
function megaCelebration() {
  // Burst of confetti
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = 50 + (Math.random() - 0.5) * 50 + 'vw';
      c.style.top = '50vh';
      c.style.animationDuration = '3s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 20);
  }

  // Extra balloons
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
      b.style.left = Math.random() * 100 + 'vw';
      b.style.animationDuration = '6s';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 6000);
    }, i * 100);
  }

  // Sparkles
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = '✨';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
