<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Teachers' Day 👨‍🏫</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #1e3a5f, #2d5a87, #4682b4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: #f5f5dc;
  text-shadow: 0 0 30px #daa520, 0 0 60px #b8860b;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #daa520, 0 0 60px #b8860b; }
  50% { text-shadow: 0 0 50px #daa520, 0 0 100px #f5f5dc, 0 0 150px #daa520; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #daa520, #b8860b);
  color: #1e3a5f;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(218,165,32,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating books and apples */
.book {
  position: absolute;
  font-size: 35px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Stars */
.star {
  position: absolute;
  font-size: 20px;
  animation: twinkle 1.5s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: #1e3a5f;
  background: linear-gradient(135deg, #daa520, #f5f5dc);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(218,165,32,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#teacherMsg {
  display: none;
  font-size: 3rem;
  color: #f5f5dc;
  text-shadow: 0 0 30px #daa520;
}

.apple {
  font-size: 100px;
  margin: 20px;
  animation: bounce 1s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">👨‍🏫 Happy Teachers' Day <span id="name"></span>! 📚</h1>

<button id="yes" class="btn">Thank You 🍎</button>
<button id="no" class="btn">Nah 😒</button>

<div id="teacherMsg">
  <div class="apple">🍎</div>
  🌟 Best Teacher Ever <span id="name2"></span>! 🌟
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("teacherMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Teacher';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Happy Teachers' Day " + name + " 👨‍🏫";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press THANK YOU 🍎", "Arey yaar 😂", "Stop chasing meee 😆", "Thank your teacher 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "Nah option disabled 😂", "Destiny says THANKS 👨‍🏫", "Bas karo 😂",
  "You really trying huh 🤭", "Team TEACHER only 😌", "Dil se bolo YES 🍎",
  "Arre arre arre 😆", "Thanks only, no nah 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape gratitude 👨‍🏫",
  "Say thanks warna… 😜", "Smart person chooses THANKS 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click THANK YOU, be happy 🍎"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No gratitude? 😢"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating books and apples */
const items = ['📚', '📖', '🍎', '✏️', '🎓', '⭐'];
setInterval(() => {
  const item = document.createElement('div');
  item.className = 'book';
  item.textContent = items[Math.floor(Math.random() * items.length)];
  item.style.left = Math.random() * 100 + 'vw';
  item.style.top = (10 + Math.random() * 60) + '%';
  item.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(item);
  setTimeout(() => item.remove(), 9000);
}, 600);

/* Stars */
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = '⭐';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const item = document.createElement('div');
      item.className = 'book';
      item.textContent = items[Math.floor(Math.random() * items.length)];
      item.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      item.style.top = '30%';
      item.style.fontSize = (30 + Math.random() * 40) + 'px';
      item.style.animationDuration = '4s';
      document.body.appendChild(item);
      setTimeout(() => item.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '✨';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
