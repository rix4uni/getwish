<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Get Well Soon 💐</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #a8e6cf, #dcedc1, #ffd3b6, #ffaaa5);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: #5d8a66;
  text-shadow: 0 0 30px #a8e6cf, 0 0 60px #dcedc1;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #a8e6cf, 0 0 60px #dcedc1; }
  50% { text-shadow: 0 0 50px #ffffff, 0 0 100px #a8e6cf, 0 0 150px #5d8a66; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #5d8a66, #a8e6cf);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(93,138,102,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating healing items */
.healing {
  position: absolute;
  font-size: 35px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 25px;
  animation: heartFloat 5s linear forwards;
}

@keyframes heartFloat {
  from { transform: translateY(100vh) scale(0.5); opacity: 0; }
  to { transform: translateY(-10vh) scale(1); opacity: 0.9; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #5d8a66, #a8e6cf);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(93,138,102,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#getwellMsg {
  display: none;
  font-size: 2.5rem;
  color: #5d8a66;
  text-shadow: 0 0 30px #a8e6cf;
  max-width: 80%;
}

.flower {
  font-size: 100px;
  margin: 20px;
  animation: bloom 2s ease-in-out infinite;
}

@keyframes bloom {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">💐 Get Well Soon <span id="name"></span>! 💚</h1>

<button id="yes" class="btn">Feel Better 💐</button>
<button id="no" class="btn">No 😒</button>

<div id="getwellMsg">
  <div class="flower">💐</div>
  💚 Sending you my best wishes and hoping you feel better soon <span id="name2"></span>! 💚
</div>

<script>
/* Anti-Tampering Protection */
(function() {
  'use strict';
  let protectionInterval = null, devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); if (window._mouseHandler) { document.addEventListener('mousemove', window._mouseHandler); document._protectedMouseMove = true; } }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("getwellMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Get Well Soon " + name + " 💐";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press FEEL BETTER 💐", "Arey yaar 😂", "Stop chasing meee 😆", "Get well soon 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "No option disabled 😂", "Destiny says HEALTH 💚", "Bas karo 😂",
  "You really trying huh 🤭", "Team WELLNESS only 😌", "Dil se bolo YES 💐",
  "Arre arre arre 😆", "Health only, no no 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape care 💐",
  "Say get well warna… 😜", "Smart person chooses CARE 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click BETTER, be happy 💐"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No care? 💔"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
window._mouseHandler = _mouseHandler;
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating healing items */
const healings = ['💐', '🌻', '💚', '🩵', '🌸', '🌺', '🌷', '💊'];
setInterval(() => {
  const h = document.createElement('div');
  h.className = 'healing';
  h.textContent = healings[Math.floor(Math.random() * healings.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.top = (10 + Math.random() * 60) + '%';
  h.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 9000);
}, 600);

/* Hearts */
const hearts = ['💚', '🩵', '🤍', '💛', '💖'];
setInterval(() => {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (4 + Math.random() * 2) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 400);

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'healing';
      h.textContent = healings[Math.floor(Math.random() * healings.length)];
      h.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      h.style.top = '30%';
      h.style.fontSize = (30 + Math.random() * 40) + 'px';
      h.style.animationDuration = '4s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      h.style.top = '50%';
      h.style.fontSize = (25 + Math.random() * 25) + 'px';
      h.style.animationDuration = '4s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }, i * 50);
  }
}
</script>

</body>
</html>
