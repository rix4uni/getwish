<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Father's Day 👨‍👧‍👦</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #2c3e50, #3498db, #2980b9);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: #ecf0f1;
  text-shadow: 0 0 30px #3498db, 0 0 60px #2980b9;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #3498db, 0 0 60px #2980b9; }
  50% { text-shadow: 0 0 50px #3498db, 0 0 100px #ecf0f1, 0 0 150px #3498db; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #f1c40f, #f39c12);
  color: #2c3e50;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(241,196,15,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Ties floating */
.tie {
  position: absolute;
  font-size: 35px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Stars */
.star {
  position: absolute;
  font-size: 20px;
  animation: twinkle 1.5s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: #2c3e50;
  background: linear-gradient(135deg, #f1c40f, #ecf0f1);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(241,196,15,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#dadMsg {
  display: none;
  font-size: 3rem;
  color: #ecf0f1;
  text-shadow: 0 0 30px #3498db;
}

.heart {
  font-size: 100px;
  margin: 20px;
  animation: heartbeat 1s ease-in-out infinite;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
</style>
</head>

<body>

<h1 id="mainText">👨‍👧‍👦 Happy Father's Day <span id="name"></span>! 💙</h1>

<button id="yes" class="btn">Love You Dad 💙</button>
<button id="no" class="btn">Nah 😒</button>

<div id="dadMsg">
  <div class="heart">👔</div>
  💙 Best Dad Ever <span id="name2"></span>! 💙
</div>

<script>
/* Anti-Tampering Protection */
(function() {
  'use strict';
  let protectionInterval = null, devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); if (window._mouseHandler) { document.addEventListener('mousemove', window._mouseHandler); document._protectedMouseMove = true; } }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("dadMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Dad';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Happy Father's Day " + name + " 👨‍👧‍👦";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press LOVE DAD 💙", "Arey yaar 😂", "Stop chasing meee 😆", "Love your dad 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "Nah option disabled 😂", "Destiny says LOVE 👨‍👧‍👦", "Bas karo 😂",
  "You really trying huh 🤭", "Team DAD only 😌", "Dil se bolo YES 💙",
  "Arre arre arre 😆", "Love only, no nah 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape love 👨‍👧‍👦",
  "Say love warna… 😜", "Smart person chooses DAD 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click LOVE, be happy 💙"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("Don't love dad? 😢"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
window._mouseHandler = _mouseHandler;
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating ties */
const ties = ['👔', '🎩', '⭐', '💙', '👨‍👧‍👦'];
setInterval(() => {
  const t = document.createElement('div');
  t.className = 'tie';
  t.textContent = ties[Math.floor(Math.random() * ties.length)];
  t.style.left = Math.random() * 100 + 'vw';
  t.style.top = (10 + Math.random() * 60) + '%';
  t.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 9000);
}, 600);

/* Stars */
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = '⭐';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const t = document.createElement('div');
      t.className = 'tie';
      t.textContent = ties[Math.floor(Math.random() * ties.length)];
      t.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      t.style.top = '30%';
      t.style.fontSize = (30 + Math.random() * 40) + 'px';
      t.style.animationDuration = '4s';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '✨';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
