<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Congratulations on New Job 🎉</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #2193b0, #6dd5ed, #cc2b5e, #753a88);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px #2193b0, 0 0 60px #753a88;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #2193b0, 0 0 60px #753a88; }
  50% { text-shadow: 0 0 50px #ffffff, 0 0 100px #2193b0, 0 0 150px #753a88; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #2193b0, #753a88);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(33,147,176,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating career items */
.career {
  position: absolute;
  font-size: 35px;
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-25px) rotate(10deg); }
}

/* Confetti */
.confetti {
  position: absolute;
  font-size: 20px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #2193b0, #753a88);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(33,147,176,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#newjobMsg {
  display: none;
  font-size: 2.2rem;
  color: white;
  text-shadow: 0 0 30px #2193b0;
  max-width: 85%;
}

.trophy {
  font-size: 100px;
  margin: 20px;
  animation: shine 1.5s ease-in-out infinite;
}

@keyframes shine {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">🎉 Congratulations <span id="name"></span>! 🚀</h1>

<button id="yes" class="btn">Congrats 🎉</button>
<button id="no" class="btn">No 😒</button>

<div id="newjobMsg">
  <div class="trophy">🏆</div>
  🚀 Congratulations on your new role <span id="name2"></span>! May this next chapter be filled with growth, big wins, and coworkers who become friends. 🎉
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("newjobMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Champion';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "New Job " + name + " 🎉";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press CONGRATS 🎉", "Arey yaar 😂", "Stop chasing meee 😆", "Celebrate success 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "No option disabled 😂", "Destiny says SUCCESS 🚀", "Bas karo 😂",
  "You really trying huh 🤭", "Team WINNER only 😌", "Dil se bolo YES 🎉",
  "Arre arre arre 😆", "Success only, no no 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape victory 🚀",
  "Say congrats warna… 😜", "Smart person chooses WIN 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click CONGRATS, be happy 🎉"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No ambition? 📉"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating career items */
const careers = ['💼', '📈', '🎯', '🏆', '🚀', '💻', '📊', '⭐'];
setInterval(() => {
  const c = document.createElement('div');
  c.className = 'career';
  c.textContent = careers[Math.floor(Math.random() * careers.length)];
  c.style.left = Math.random() * 100 + 'vw';
  c.style.top = (10 + Math.random() * 60) + '%';
  c.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 8000);
}, 600);

/* Confetti rain */
const colors = ['🎊', '✨', '🎉', '🎀', '🌟'];
setInterval(() => {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.textContent = colors[Math.floor(Math.random() * colors.length)];
  c.style.left = Math.random() * 100 + 'vw';
  c.style.animationDuration = (3 + Math.random() * 2) + 's';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 5000);
}, 300);

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'career';
      c.textContent = careers[Math.floor(Math.random() * careers.length)];
      c.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      c.style.top = '30%';
      c.style.fontSize = (40 + Math.random() * 40) + 'px';
      c.style.animationDuration = '4s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      c.style.top = '0%';
      c.style.fontSize = (25 + Math.random() * 20) + 'px';
      c.style.animationDuration = '3s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 50);
  }
}
</script>

</body>
</html>
