<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Beginnings ✨</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px #667eea, 0 0 60px #764ba2;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #667eea, 0 0 60px #764ba2; }
  50% { text-shadow: 0 0 50px #ffffff, 0 0 100px #667eea, 0 0 150px #764ba2; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(102,126,234,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating stars and paths */
.beginning {
  position: absolute;
  font-size: 35px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Shooting stars */
.shooting {
  position: absolute;
  font-size: 20px;
  animation: shoot 3s linear forwards;
}

@keyframes shoot {
  from { transform: translateX(-10vw) translateY(50vh) rotate(45deg); opacity: 1; }
  to { transform: translateX(110vw) translateY(-20vh) rotate(45deg); opacity: 0; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(102,126,234,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#newMsg {
  display: none;
  font-size: 2.5rem;
  color: white;
  text-shadow: 0 0 30px #667eea;
  max-width: 80%;
}

.door {
  font-size: 100px;
  margin: 20px;
  animation: open 1.5s ease-in-out infinite;
}

@keyframes open {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1) rotate(3deg); }
}
</style>
</head>

<body>

<h1 id="mainText">✨ New Beginnings <span id="name"></span>! 🌅</h1>

<button id="yes" class="btn">Best Wishes ✨</button>
<button id="no" class="btn">No 😒</button>

<div id="newMsg">
  <div class="door">🚪</div>
  ✨ Wishing you all the best in this new and exciting adventure <span id="name2"></span>! 🌟
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("newMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "New Beginnings " + name + " ✨";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press BEST WISHES ✨", "Arey yaar 😂", "Stop chasing meee 😆", "Embrace new starts 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "No option disabled 😂", "Destiny says NEW ✨", "Bas karo 😂",
  "You really trying huh 🤭", "Team BRAVE only 😌", "Dil se bolo YES ✨",
  "Arre arre arre 😆", "New only, no no 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape future ✨",
  "Say yes warna… 😜", "Smart person chooses YES 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click WISHES, be happy ✨"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No courage? 🌅"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating beginnings */
const beginnings = ['✨', '🌟', '⭐', '🚀', '🦋', '🌅', '🚪', '🌈'];
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'beginning';
  b.textContent = beginnings[Math.floor(Math.random() * beginnings.length)];
  b.style.left = Math.random() * 100 + 'vw';
  b.style.top = (10 + Math.random() * 60) + '%';
  b.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 9000);
}, 600);

/* Shooting stars */
setInterval(() => {
  const s = document.createElement('div');
  s.className = 'shooting';
  s.textContent = '⭐';
  s.style.top = (10 + Math.random() * 50) + '%';
  s.style.animationDuration = (2 + Math.random() * 2) + 's';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 4000);
}, 2000);

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'beginning';
      b.textContent = beginnings[Math.floor(Math.random() * beginnings.length)];
      b.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      b.style.top = '30%';
      b.style.fontSize = (30 + Math.random() * 40) + 'px';
      b.style.animationDuration = '4s';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'shooting';
      s.textContent = '✨';
      s.style.top = Math.random() * 100 + '%';
      s.style.fontSize = (30 + Math.random() * 20) + 'px';
      s.style.animationDuration = '3s';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 3000);
    }, i * 100);
  }
}
</script>

</body>
</html>
