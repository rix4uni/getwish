<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Diwali 🪔</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ff6600, 0 0 60px #ff9900;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #ff6600, 0 0 60px #ff9900; }
  50% { text-shadow: 0 0 50px #ff6600, 0 0 100px #ff9900, 0 0 150px #ffcc00; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #333;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,215,0,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Fireworks */
.firework {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: explode 1.5s ease-out forwards;
}

@keyframes explode {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--tx), var(--ty)) scale(0);
    opacity: 0;
  }
}

/* Spark */
.spark {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #ffd700;
  border-radius: 50%;
  box-shadow: 0 0 6px #ffd700, 0 0 12px #ff6600;
  animation: sparkle 1.5s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1.5); }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: #333;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,215,0,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#diwaliMsg {
  display: none;
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ff6600;
}

.diya {
  font-size: 80px;
  margin: 20px;
  animation: flicker 1s ease-in-out infinite;
}

@keyframes flicker {
  0%, 100% { transform: scale(1) rotate(-2deg); filter: brightness(1); }
  50% { transform: scale(1.05) rotate(2deg); filter: brightness(1.2); }
}
</style>
</head>

<body>

<h1 id="mainText">🪔 Happy Diwali <span id="name"></span>! 🎆</h1>

<button id="yes" class="btn">Celebrate 🪔</button>
<button id="no" class="btn">Dark 😒</button>

<div id="diwaliMsg">
  <div class="diya">🪔</div>
  ✨ Light Up <span id="name2"></span>! ✨
</div>

<script>
/* Anti-Tampering Protection - Makes No Button Immortal */
(function() {
  'use strict';
  let protectionInterval = null;
  let devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("diwaliMsg");
const mainText = document.getElementById("mainText");

// Get name from URL
const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy Diwali ' + name + ' 🪔';

let attempts = 0;
let popupLock = false;
let escapeCooldown = false;

/* Funny Diwali lines */
const funnyTexts = [
  "Nice try 😜",
  "Hehe can't catch me 😂",
  "Almosttt 🤭",
  "Too slow 😏",
  "Press CELEBRATE 🪔",
  "Arey yaar 😂",
  "Stop chasing meee 😆",
  "Celebrate with lights 🥺",
  "Itna attitude? 😏",
  "Catch me if you can 🏃",
  "Wrong button buddy 😜",
  "Dark option disabled 😂",
  "Destiny says LIGHT 🪔",
  "Bas karo 😂",
  "You really trying huh 🤭",
  "Team DIWALI only 😌",
  "Dil se bolo YES ✨",
  "Arre arre arre 😆",
  "Lights only, no dark 😜",
  "System error ❌",
  "Button not available 😂",
  "Try harder 😏",
  "You can't escape light 🪔",
  "Say celebrate warna… 😜",
  "Smart person chooses LIGHT 😉",
  "LOL nice attempt 🤣",
  "Mission failed 😂",
  "This button is shy 🙈",
  "Click CELEBRATE, be happy 🪔"
];

/* YES CLICK */
yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

/* Chase detection */
_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("Staying in dark? 🌑"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

/* Move No button */
function moveNo() {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 70);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* Small popup */
function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;

  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";

  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
    popupLock = false;
  }, 900);
}

/* Big message (3 seconds) */
function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Firework colors */
const fireworkColors = ['#ff6600', '#ff9900', '#ffcc00', '#ff0000', '#ff1493', '#00ff00', '#00ffff', '#ffffff'];

/* Create fireworks */
function createFirework(x, y) {
  const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
  for (let i = 0; i < 30; i++) {
    const fw = document.createElement('div');
    fw.className = 'firework';
    fw.style.background = color;
    fw.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;
    fw.style.left = x + 'px';
    fw.style.top = y + 'px';
    const angle = (Math.PI * 2 * i) / 30;
    const distance = 80 + Math.random() * 120;
    fw.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    fw.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 1500);
  }
}

/* Auto fireworks */
setInterval(() => {
  createFirework(
    Math.random() * window.innerWidth,
    Math.random() * window.innerHeight * 0.6
  );
}, 1500);

/* Sparks */
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'spark';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

/* Mega celebration */
function megaCelebration() {
  // Burst of fireworks
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      createFirework(
        window.innerWidth / 2 + (Math.random() - 0.5) * 400,
        window.innerHeight / 2 + (Math.random() - 0.5) * 300
      );
    }, i * 200);
  }

  // Continuous fireworks for 5 seconds
  let count = 0;
  const interval = setInterval(() => {
    createFirework(
      Math.random() * window.innerWidth,
      Math.random() * window.innerHeight * 0.7
    );
    count++;
    if (count > 20) clearInterval(interval);
  }, 250);

  // Extra sparks
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
