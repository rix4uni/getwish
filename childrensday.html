<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Children's Day 🎈</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(135deg, #ff9a9e, #fecfef, #fecfef, #a8edea);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  color: #ff6b9d;
  text-shadow: 0 0 30px #ff9a9e, 0 0 60px #fecfef;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #ff9a9e, 0 0 60px #fecfef; }
  50% { text-shadow: 0 0 50px #ff6b9d, 0 0 100px #ffffff, 0 0 150px #ff9a9e; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Comic Sans MS", cursive;
}

#yes {
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,107,157,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating balloons */
.balloon {
  position: absolute;
  font-size: 40px;
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-25px) rotate(10deg); }
}

/* Confetti */
.confetti {
  position: absolute;
  font-size: 20px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Comic Sans MS", cursive;
  color: white;
  background: linear-gradient(135deg, #ff6b9d, #ff9a9e);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,107,157,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#childrenMsg {
  display: none;
  font-size: 3rem;
  color: #ff6b9d;
  text-shadow: 0 0 30px #ff9a9e;
}

.toy {
  font-size: 100px;
  margin: 20px;
  animation: bounce 1s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">🎈 Happy Children's Day <span id="name"></span>! 🧸</h1>

<button id="yes" class="btn">Celebrate 🎈</button>
<button id="no" class="btn">Skip 😒</button>

<div id="childrenMsg">
  <div class="toy">🎠</div>
  🎉 Stay Young & Happy <span id="name2"></span>! 🎉
</div>

<script>
/* Anti-Tampering Protection - Makes No Button Immortal */
(function() {
  'use strict';
  let protectionInterval = null;
  let devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("childrenMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Child';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Happy Children's Day " + name + " 🎈";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press CELEBRATE 🎈", "Arey yaar 😂", "Stop chasing meee 😆", "Be a child again 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "Skip option disabled 😂", "Destiny says FUN 🎠", "Bas karo 😂",
  "You really trying huh 🤭", "Team HAPPINESS only 😌", "Dil se bolo YES 🎈",
  "Arre arre arre 😆", "Fun only, no skip 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape joy 🎠",
  "Say celebrate warna… 😜", "Smart person chooses FUN 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click CELEBRATE, be happy 🎈"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No fun? 🎠"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating balloons */
const balloons = ['🎈', '🎉', '🎊', '🎁', '🧸', '🎠', '🎡', '🎢'];
setInterval(() => {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.textContent = balloons[Math.floor(Math.random() * balloons.length)];
  b.style.left = Math.random() * 100 + 'vw';
  b.style.top = (10 + Math.random() * 60) + '%';
  b.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 8000);
}, 600);

/* Confetti rain */
const colors = ['🎊', '✨', '🎀', '🌟'];
setInterval(() => {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.textContent = colors[Math.floor(Math.random() * colors.length)];
  c.style.left = Math.random() * 100 + 'vw';
  c.style.animationDuration = (3 + Math.random() * 2) + 's';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 5000);
}, 300);

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.textContent = balloons[Math.floor(Math.random() * balloons.length)];
      b.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      b.style.top = '30%';
      b.style.fontSize = (40 + Math.random() * 40) + 'px';
      b.style.animationDuration = '4s';
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      c.style.top = '0%';
      c.style.fontSize = (25 + Math.random() * 20) + 'px';
      c.style.animationDuration = '3s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 50);
  }
}
</script>

</body>
</html>
