<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Holi 🌈</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Comic Sans MS", cursive;
  background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
  background-size: 400% 400%;
  animation: rainbow 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  font-size: 3.5rem;
  color: white;
  text-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 40px rgba(255,255,255,0.5);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Comic Sans MS", cursive;
}

#yes {
  background: white;
  color: #333;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,255,255,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Color particles */
.color-particle {
  position: absolute;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  animation: splash 5s linear forwards;
}

@keyframes splash {
  from {
    transform: translate(0, 0) scale(0);
    opacity: 1;
  }
  to {
    transform: translate(var(--tx), var(--ty)) scale(1);
    opacity: 0;
  }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Comic Sans MS", cursive;
  color: white;
  background: linear-gradient(135deg, #ff1493, #ff6600);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,255,255,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#holiMsg {
  display: none;
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px rgba(0,0,0,0.8);
}

.pichkari {
  font-size: 80px;
  margin: 20px;
  animation: spray 1s ease-in-out infinite;
}

@keyframes spray {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
}
</style>
</head>

<body>

<h1 id="mainText">🌈 Happy Holi <span id="name"></span>! 🎨</h1>

<button id="yes" class="btn">Play 🌈</button>
<button id="no" class="btn">Nah 😤</button>

<div id="holiMsg">
  <div class="pichkari">🔫</div>
  🎨 Let's Celebrate <span id="name2"></span>! 🌈
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("holiMsg");
const mainText = document.getElementById("mainText");

// Get name from URL
const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy Holi ' + name + ' 🌈';

let attempts = 0;
let popupLock = false;
let escapeCooldown = false;

/* Funny Holi lines */
const funnyTexts = [
  "Nice try 😜",
  "Hehe can't catch me 😂",
  "Almosttt 🤭",
  "Too slow 😏",
  "Press PLAY 🌈",
  "Arey yaar 😂",
  "Stop chasing meee 😆",
  "Play with colors naaa 🥺",
  "Itna attitude? 😏",
  "Catch me if you can 🏃",
  "Wrong button buddy 😜",
  "Nah option disabled 😂",
  "Destiny says PLAY 🌈",
  "Bas karo 😂",
  "You really trying huh 🤭",
  "Team HOLI only 😌",
  "Dil se bolo YES 🎨",
  "Arre arre arre 😆",
  "Colors only, no nah 😜",
  "System error ❌",
  "Button not available 😂",
  "Try harder 😏",
  "You can't escape colors 🌈",
  "Say play warna… 😜",
  "Smart person chooses COLORS 😉",
  "LOL nice attempt 🤣",
  "Mission failed 😂",
  "This button is shy 🙈",
  "Click PLAY, be happy 🌈"
];

/* YES CLICK */
yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

/* Chase detection */
document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;

  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(
    e.clientX - (rect.left + rect.width / 2),
    e.clientY - (rect.top + rect.height / 2)
  );

  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);

    if (attempts >= 5) {
      bigMessage("No colors? 😢");
      attempts = 0;
    }

    setTimeout(() => escapeCooldown = false, 350);
  }
});

/* Move No button */
function moveNo() {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 70);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* Small popup */
function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;

  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";

  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
    popupLock = false;
  }, 900);
}

/* Big message (3 seconds) */
function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Colors for Holi */
const colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3', '#ff1493', '#00ffff', '#ff69b4'];

/* Color explosions */
function createColorExplosion(x, y) {
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'color-particle';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    const angle = (Math.PI * 2 * i) / 30;
    const distance = 100 + Math.random() * 200;
    p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 5000);
  }
}

/* Auto color bursts */
setInterval(() => {
  createColorExplosion(
    Math.random() * window.innerWidth,
    Math.random() * window.innerHeight
  );
}, 2000);

/* Mega celebration */
function megaCelebration() {
  // Multiple color explosions
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      createColorExplosion(
        Math.random() * window.innerWidth,
        Math.random() * window.innerHeight
      );
    }, i * 300);
  }

  // Continuous explosions for 5 seconds
  let count = 0;
  const interval = setInterval(() => {
    createColorExplosion(
      window.innerWidth / 2 + (Math.random() - 0.5) * 400,
      window.innerHeight / 2 + (Math.random() - 0.5) * 300
    );
    count++;
    if (count > 15) clearInterval(interval);
  }, 300);
}

/* Click anywhere for colors */
document.body.onclick = (e) => {
  if (e.target.id !== 'yes' && e.target.id !== 'no') {
    createColorExplosion(e.clientX, e.clientY);
  }
};
</script>

</body>
</html>
