<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy New Year 🎊</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(180deg, #000428, #004e92, #000428);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ff6600, 0 0 60px #ff9900;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffaa00; }
  50% { text-shadow: 0 0 50px #ffd700, 0 0 100px #ffffff, 0 0 150px #ff6600; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #333;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,215,0,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Fireworks */
.firework {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: explode 2s ease-out forwards;
}

@keyframes explode {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* Confetti */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: confettiFall 4s linear forwards;
}

@keyframes confettiFall {
  from { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: #333;
  background: linear-gradient(135deg, #ffd700, #ffffff);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,215,0,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#nyMsg {
  display: none;
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px #ff6600;
}

.champagne {
  font-size: 80px;
  margin: 20px;
  animation: popBottle 1s ease-in-out infinite;
}

@keyframes popBottle {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">🎊 Happy New Year <span id="name"></span>! 🎆</h1>

<button id="yes" class="btn">Cheers 🥂</button>
<button id="no" class="btn">Nah 😒</button>

<div id="nyMsg">
  <div class="champagne">🍾</div>
  🎉 Best Wishes <span id="name2"></span>! 🎉
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("nyMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Friend';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy New Year ' + name + ' 🎊';

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press CHEERS 🥂", "Arey yaar 😂", "Stop chasing meee 😆", "Celebrate naaa 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "Nah option disabled 😂", "Destiny says CELEBRATE 🎊", "Bas karo 😂",
  "You really trying huh 🤭", "Team NEW YEAR only 😌", "Dil se bolo YES 🥂",
  "Arre arre arre 😆", "Celebration only, no nah 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape 2026 🎆",
  "Say cheers warna… 😜", "Smart person chooses PARTY 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click CHEERS, be happy 🥂"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No celebration? 🎆"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

const colors = ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3', '#ffd700', '#ffffff', '#ff6600'];

function createFirework(x, y) {
  const color = colors[Math.floor(Math.random() * colors.length)];
  for (let i = 0; i < 30; i++) {
    const fw = document.createElement('div');
    fw.className = 'firework';
    fw.style.background = color;
    fw.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;
    fw.style.left = x + 'px';
    fw.style.top = y + 'px';
    const angle = (Math.PI * 2 * i) / 30;
    const distance = 80 + Math.random() * 120;
    fw.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
    fw.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 2000);
  }
}

setInterval(() => {
  createFirework(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.6);
}, 1500);

setInterval(() => {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.background = colors[Math.floor(Math.random() * colors.length)];
  c.style.left = Math.random() * 100 + 'vw';
  c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 4000);
}, 200);

function megaCelebration() {
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      createFirework(window.innerWidth/2 + (Math.random()-0.5)*400, window.innerHeight/2 + (Math.random()-0.5)*300);
    }, i * 200);
  }
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.left = 50 + (Math.random() - 0.5) * 50 + 'vw';
      c.style.top = '0';
      c.style.animationDuration = '3s';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }, i * 20);
  }
}
</script>

</body>
</html>
