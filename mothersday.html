<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Mother's Day ЁЯСйтАНЁЯСзтАНЁЯСж</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #ff69b4, #ffb6c1, #ffc0cb);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px #ff1493, 0 0 60px #ff69b4;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #ff1493, 0 0 60px #ff69b4; }
  50% { text-shadow: 0 0 50px #ff1493, 0 0 100px #ffffff, 0 0 150px #ff69b4; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #ff1493, #ff69b4);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,20,147,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating flowers */
.flower {
  position: absolute;
  font-size: 40px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

/* Hearts floating */
.heart {
  position: absolute;
  font-size: 25px;
  animation: heartFloat 5s linear forwards;
}

@keyframes heartFloat {
  from { transform: translateY(100vh) scale(0.5); opacity: 0; }
  to { transform: translateY(-10vh) scale(1); opacity: 0.9; }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #ff1493, #ff69b4);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(255,20,147,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#momMsg {
  display: none;
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px #ff1493;
}

.flower-main {
  font-size: 100px;
  margin: 20px;
  animation: bloom 2s ease-in-out infinite;
}

@keyframes bloom {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">ЁЯСйтАНЁЯСзтАНЁЯСж Happy Mother's Day <span id="name"></span>! ЁЯТЧ</h1>

<button id="yes" class="btn">Love You Mom ЁЯТЧ</button>
<button id="no" class="btn">Nah ЁЯШТ</button>

<div id="momMsg">
  <div class="flower-main">ЁЯМ╖</div>
  ЁЯТЧ Best Mom Ever <span id="name2"></span>! ЁЯТЧ
</div>

<script>
/* Anti-Tampering Protection */
(function() {
  'use strict';
  let protectionInterval = null, devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! ЁЯШЬ\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); if (window._mouseHandler) { document.addEventListener('mousemove', window._mouseHandler); document._protectedMouseMove = true; } }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("momMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Mom';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Happy Mother's Day " + name + " ЁЯСйтАНЁЯСзтАНЁЯСж";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try ЁЯШЬ", "Hehe can't catch me ЁЯШВ", "Almosttt ЁЯдн", "Too slow ЁЯШП",
  "Press LOVE MOM ЁЯТЧ", "Arey yaar ЁЯШВ", "Stop chasing meee ЁЯШЖ", "Love your mom ЁЯе║",
  "Itna attitude? ЁЯШП", "Catch me if you can ЁЯПГ", "Wrong button buddy ЁЯШЬ",
  "Nah option disabled ЁЯШВ", "Destiny says LOVE ЁЯСйтАНЁЯСзтАНЁЯСж", "Bas karo ЁЯШВ",
  "You really trying huh ЁЯдн", "Team MOM only ЁЯШМ", "Dil se bolo YES ЁЯТЧ",
  "Arre arre arre ЁЯШЖ", "Love only, no nah ЁЯШЬ", "System error тЭМ",
  "Button not available ЁЯШВ", "Try harder ЁЯШП", "You can't escape love ЁЯСйтАНЁЯСзтАНЁЯСж",
  "Say love warnaтАж ЁЯШЬ", "Smart person chooses MOM ЁЯШЙ", "LOL nice attempt ЁЯдг",
  "Mission failed ЁЯШВ", "This button is shy ЁЯЩИ", "Click LOVE, be happy ЁЯТЧ"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("Don't love mom? ЁЯШв"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
window._mouseHandler = _mouseHandler;
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating flowers */
const flowers = ['ЁЯМ╖', 'ЁЯМ╣', 'ЁЯМ╕', 'ЁЯМ║', 'ЁЯМ╗', 'ЁЯМ╝', 'ЁЯТР'];
setInterval(() => {
  const f = document.createElement('div');
  f.className = 'flower';
  f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
  f.style.left = Math.random() * 100 + 'vw';
  f.style.top = (10 + Math.random() * 60) + '%';
  f.style.animationDuration = (4 + Math.random() * 3) + 's';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 9000);
}, 600);

/* Floating hearts */
const hearts = ['ЁЯТЧ', 'ЁЯТЦ', 'ЁЯТХ', 'тЭдя╕П', 'ЁЯТЭ'];
setInterval(() => {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (4 + Math.random() * 2) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 400);

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const f = document.createElement('div');
      f.className = 'flower';
      f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      f.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      f.style.top = '30%';
      f.style.fontSize = (30 + Math.random() * 40) + 'px';
      f.style.animationDuration = '4s';
      document.body.appendChild(f);
      setTimeout(() => f.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      h.style.top = '50%';
      h.style.fontSize = (25 + Math.random() * 25) + 'px';
      h.style.animationDuration = '4s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }, i * 50);
  }
}
</script>

</body>
</html>
