<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Anniversary 💍</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #e94560);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.6);
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px rgba(255,215,0,0.6); }
  50% { text-shadow: 0 0 50px rgba(255,215,0,1), 0 0 80px rgba(255,215,0,0.5); }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #333;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(255,215,0,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating hearts */
.heart {
  position: absolute;
  font-size: 24px;
  animation: float 8s linear forwards;
  opacity: 0.8;
}

@keyframes float {
  from {
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh) scale(1);
    opacity: 0.8;
  }
}

/* Sparkles */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ffd700;
  border-radius: 50%;
  box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
  animation: sparkle 2s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1); }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(233,69,96,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#loveMsg {
  display: none;
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255,215,0,0.8);
}

.ring {
  font-size: 80px;
  margin: 20px;
  animation: rotate 4s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1 id="mainText">💍 Happy Anniversary <span id="name"></span> 💕</h1>

<button id="yes" class="btn">Cheers 🥂</button>
<button id="no" class="btn">Skip 😤</button>

<div id="loveMsg">
  <div class="ring">💍</div>
  💖 To Many More Years <span id="name2"></span>! 💖
</div>

<script>
/* Anti-Tampering Protection - Makes No Button Immortal */
(function() {
  'use strict';
  let protectionInterval = null;
  let devToolsCheckInterval = null;
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
  });
  function immortalizeNoButton() {
    const noBtn = document.getElementById('no');
    if (!noBtn) return;
    Object.defineProperty(noBtn, 'disabled', { get: function() { return false; }, set: function() { return false; }, configurable: false });
    const originalDisplay = noBtn.style.display;
    Object.defineProperty(noBtn.style, 'display', { get: function() { return originalDisplay || 'block'; }, set: function(value) { if (value === 'none') return; originalDisplay = value; return value; }, configurable: false });
    Object.defineProperty(noBtn.style, 'visibility', { get: function() { return 'visible'; }, set: function() { return 'visible'; }, configurable: false });
    Object.defineProperty(noBtn.style, 'opacity', { get: function() { return '1'; }, set: function() { return '1'; }, configurable: false });
  }
  function detectDevTools() {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) { alert('No cheating allowed! 😜\nPlease close Developer Tools!'); window.location.reload(); }
  }
  const originalInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
  Object.defineProperty(Element.prototype, 'innerHTML', { set: function(value) { originalInnerHTML.set.call(this, value); setTimeout(function() { if (typeof immortalizeNoButton === 'function') immortalizeNoButton(); }, 0); }, get: function() { return originalInnerHTML.get.call(this); }, configurable: false });
  Object.defineProperty(document.body, 'innerHTML', { set: function(value) { Element.prototype.innerHTML = value; }, get: function() { return document.body.innerHTML; }, configurable: false });
  protectionInterval = setInterval(function() { const noBtn = document.getElementById('no'); if (noBtn) { noBtn.style.display = 'block'; noBtn.disabled = false; noBtn.style.visibility = 'visible'; noBtn.style.opacity = '1'; } }, 50);
  devToolsCheckInterval = setInterval(detectDevTools, 1000);
  window._immortalizeNoButton = immortalizeNoButton;
  window._protectionInterval = protectionInterval;
  window._devToolsCheckInterval = devToolsCheckInterval;
})();

let _mouseHandler = null;

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("loveMsg");
const mainText = document.getElementById("mainText");

// Get name from URL
const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Love';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = 'Happy Anniversary ' + name + ' 💍';

let attempts = 0;
let popupLock = false;
let escapeCooldown = false;

/* Funny anniversary lines */
const funnyTexts = [
  "Nice try 😜",
  "Hehe can't catch me 😂",
  "Almosttt 🤭",
  "Too slow 😏",
  "Press CHEERS 🥂",
  "Arey yaar 😂",
  "Stop chasing meee 😆",
  "Celebrate with me 🥺",
  "Itna attitude? 😏",
  "Catch me if you can 🏃",
  "Wrong button buddy 😜",
  "Skip option disabled 😂",
  "Destiny says CHEERS 🥂",
  "Bas karo 😂",
  "You really trying huh 🤭",
  "Team LOVE only 😌",
  "Dil se bolo YES 💕",
  "Arre arre arre 😆",
  "Love only, no skip 😜",
  "System error ❌",
  "Button not available 😂",
  "Try harder 😏",
  "You can't escape love 💕",
  "Say cheers warna… 😜",
  "Smart person chooses LOVE 😉",
  "LOL nice attempt 🤣",
  "Mission failed 😂",
  "This button is shy 🙈",
  "Click CHEERS, be happy 💍"
];

/* YES CLICK */
yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
  clearInterval(window._protectionInterval);
  clearInterval(window._devToolsCheckInterval);
};

/* Chase detection */
_mouseHandler = function(e) {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No love? 💔"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
};
document.addEventListener("mousemove", _mouseHandler);
if (window._immortalizeNoButton) window._immortalizeNoButton();

/* Move No button */
function moveNo() {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 70);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

/* Small popup */
function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;

  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";

  document.body.appendChild(p);

  setTimeout(() => {
    p.remove();
    popupLock = false;
  }, 900);
}

/* Big message (3 seconds) */
function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating hearts */
const hearts = ['💕', '💖', '💗', '💝', '💘', '💓'];
setInterval(() => {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.animationDuration = (6 + Math.random() * 4) + 's';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 10000);
}, 500);

/* Sparkles */
for (let i = 0; i < 20; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

/* Mega celebration */
function megaCelebration() {
  // Burst of hearts
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      h.style.top = '50vh';
      h.style.fontSize = (20 + Math.random() * 20) + 'px';
      h.style.animationDuration = '5s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 5000);
    }, i * 50);
  }

  // Extra sparkles
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
