<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Women's Day 👑</title>

<style>
* {
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #800080, #dda0dd, #ff69b4, #ffd700);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
  color: white;
  text-shadow: 0 0 30px #800080, 0 0 60px #ffd700;
  animation: glow 2s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 30px #800080, 0 0 60px #ffd700; }
  50% { text-shadow: 0 0 50px #ffffff, 0 0 100px #800080, 0 0 150px #ffd700; }
}

/* Buttons */
.btn {
  position: absolute;
  padding: 16px 40px;
  font-size: 20px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.15s;
  font-family: "Georgia", serif;
}

#yes {
  background: linear-gradient(135deg, #800080, #ff69b4);
  color: white;
  left: 40%;
  top: 60%;
  box-shadow: 0 0 25px rgba(128,0,128,0.8);
}

#no {
  background: #444;
  color: white;
  left: 55%;
  top: 60%;
}

/* Floating crowns and flowers */
.woman {
  position: absolute;
  font-size: 35px;
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-10deg); }
  50% { transform: translateY(-25px) rotate(10deg); }
}

/* Stars */
.star {
  position: absolute;
  font-size: 20px;
  animation: twinkle 1.5s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Popup bubbles */
.popup {
  position: absolute;
  background: white;
  padding: 8px 14px;
  border-radius: 14px;
  font-size: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.25);
  animation: fade 1s forwards;
  z-index: 100;
}

@keyframes fade {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}

/* Big message bubble */
.bigMsg {
  position: absolute;
  top: 22%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.5rem;
  font-weight: bold;
  font-family: "Georgia", serif;
  color: white;
  background: linear-gradient(135deg, #800080, #ff69b4);
  padding: 14px 30px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(128,0,128,0.9);
  animation: pop 0.3s;
  z-index: 10;
}

@keyframes pop {
  from { transform: translateX(-50%) scale(0); }
  to { transform: translateX(-50%) scale(1); }
}

/* Result message */
#womensMsg {
  display: none;
  font-size: 2.2rem;
  color: white;
  text-shadow: 0 0 30px #800080;
  max-width: 85%;
}

.crown {
  font-size: 100px;
  margin: 20px;
  animation: shine 1.5s ease-in-out infinite;
}

@keyframes shine {
  0%, 100% { transform: scale(1) rotate(-5deg); }
  50% { transform: scale(1.1) rotate(5deg); }
}
</style>
</head>

<body>

<h1 id="mainText">👑 Happy Women's Day <span id="name"></span>! 💜</h1>

<button id="yes" class="btn">Celebrate 👑</button>
<button id="no" class="btn">No 😒</button>

<div id="womensMsg">
  <div class="crown">👑</div>
  💜 To the women who lead with strength and inspire with grace <span id="name2"></span>: May you continue to break barriers and shine bright. Happy Women's Day! 💜
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("womensMsg");
const mainText = document.getElementById("mainText");

const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name') || 'Queen';
name = name.trim();
document.getElementById('name').textContent = name;
document.getElementById('name2').textContent = name;
document.title = "Happy Women's Day " + name + " 👑";

let attempts = 0, popupLock = false, escapeCooldown = false;

const funnyTexts = [
  "Nice try 😜", "Hehe can't catch me 😂", "Almosttt 🤭", "Too slow 😏",
  "Press CELEBRATE 👑", "Arey yaar 😂", "Stop chasing meee 😆", "Honor women 🥺",
  "Itna attitude? 😏", "Catch me if you can 🏃", "Wrong button buddy 😜",
  "No option disabled 😂", "Destiny says QUEEN 👑", "Bas karo 😂",
  "You really trying huh 🤭", "Team WOMEN only 😌", "Dil se bolo YES 👑",
  "Arre arre arre 😆", "Respect only, no no 😜", "System error ❌",
  "Button not available 😂", "Try harder 😏", "You can't escape power 👑",
  "Say celebrate warna… 😜", "Smart person chooses RESPECT 😉", "LOL nice attempt 🤣",
  "Mission failed 😂", "This button is shy 🙈", "Click CELEBRATE, be happy 👑"
];

yesBtn.onclick = () => {
  mainText.style.display = "none";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  msg.style.display = "block";
  megaCelebration();
};

document.addEventListener("mousemove", (e) => {
  if (escapeCooldown) return;
  const rect = noBtn.getBoundingClientRect();
  const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
  if (dist < 120) {
    escapeCooldown = true;
    attempts++;
    moveNo();
    showPopup(e.clientX, e.clientY);
    if (attempts >= 5) { bigMessage("No respect? 🙅"); attempts = 0; }
    setTimeout(() => escapeCooldown = false, 350);
  }
});

function moveNo() {
  noBtn.style.left = Math.random() * (window.innerWidth - 120) + "px";
  noBtn.style.top = Math.random() * (window.innerHeight - 70) + "px";
}

function showPopup(x, y) {
  if (popupLock) return;
  popupLock = true;
  const p = document.createElement("div");
  p.className = "popup";
  p.innerText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
  p.style.left = x + "px";
  p.style.top = y + "px";
  document.body.appendChild(p);
  setTimeout(() => { p.remove(); popupLock = false; }, 900);
}

function bigMessage(text) {
  const b = document.createElement("div");
  b.className = "bigMsg";
  b.innerText = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3000);
}

/* Floating women items */
const womens = ['👑', '💜', '🌸', '👸', '💪', '🦋', '✨', '⭐'];
setInterval(() => {
  const w = document.createElement('div');
  w.className = 'woman';
  w.textContent = womens[Math.floor(Math.random() * womens.length)];
  w.style.left = Math.random() * 100 + 'vw';
  w.style.top = (10 + Math.random() * 60) + '%';
  w.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(w);
  setTimeout(() => w.remove(), 8000);
}, 600);

/* Stars */
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = '⭐';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.top = Math.random() * 100 + 'vh';
  s.style.animationDelay = Math.random() * 2 + 's';
  document.body.appendChild(s);
}

function megaCelebration() {
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const w = document.createElement('div');
      w.className = 'woman';
      w.textContent = womens[Math.floor(Math.random() * womens.length)];
      w.style.left = 50 + (Math.random() - 0.5) * 40 + 'vw';
      w.style.top = '30%';
      w.style.fontSize = (40 + Math.random() * 40) + 'px';
      w.style.animationDuration = '4s';
      document.body.appendChild(w);
      setTimeout(() => w.remove(), 4000);
    }, i * 60);
  }
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '✨';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
